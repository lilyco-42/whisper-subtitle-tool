name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.mp3'
      - '*.ncm'
      - '*.wav'
      - '*.srt'
      - 'build/**'
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 代码检查 ──
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maliang faster-whisper ruff

      - name: Ruff lint
        run: ruff check --select=E,F,W --ignore=E501 .

      - name: Syntax check
        run: python -c "import ast; ast.parse(open('gui_transcribe.py', encoding='utf-8').read()); print('Syntax OK')"

      - name: Import check
        run: python -c "import maliang; from faster_whisper import WhisperModel; print('Imports OK')"

  # ── 构建 exe (仅 main 分支 push) ──
  build:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set zstandard
          pip install maliang faster-whisper

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --windows-console-mode=disable --enable-plugin=tk-inter --include-package=maliang --include-package=faster_whisper --include-package=ctranslate2 --assume-yes-for-downloads --output-dir=build gui_transcribe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-subtitle-tool
          path: build/gui_transcribe.dist/
          retention-days: 7
